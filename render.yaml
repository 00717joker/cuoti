services:
  - type: web
    name: cuoti
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:${PORT}
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cuoti-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: cuoti-db
    databaseName: cuoti
    user: cuoti_user
    plan: free